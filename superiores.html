  <!-- JavaScript -->
  <script>
    let grupoAtualVisivel = null;

    function mostrarExercicios(id) {
      const alvo = document.getElementById(id);

      if (grupoAtualVisivel === id) {
        alvo.style.display = 'none';
        grupoAtualVisivel = null;
        return;
      }

      const todasAsGrids = document.querySelectorAll('.gif-grid');
      todasAsGrids.forEach(div => div.style.display = 'none');

      if (alvo) {
        alvo.style.display = 'flex';
        grupoAtualVisivel = id;
      }
    }

    function ampliarImagem(src) {
      const modal = document.getElementById('modalImagem');
      const imagem = document.getElementById('imagemAmpliada');
      imagem.src = src;
      modal.style.display = 'flex';
    }

    function fecharModalImagem() {
      document.getElementById('modalImagem').style.display = 'none';
      document.getElementById('imagemAmpliada').src = "";
    }
  </script>
